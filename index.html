<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaBy AI</title>

<link rel="stylesheet" href="/public/style.css">

</head>
<body>

<div class="chat-app">

<div class="top-bar">

<div class="profile">
<img src="https://i.ibb.co/w6R6N53/girl.jpg">

<div>
<h2>YouR BaBy</h2>
<p>Online • Active now</p>
</div>

</div>

<div class="icons">
<div class="circle">i</div>
<div class="circle">⚙</div>
</div>

</div>

<div class="chat-box" id="chatBox">

<div class="center-logo">

<img src="https://i.ibb.co/w6R6N53/girl.jpg">

<h1>BaBy</h1>

<span>AI CHAT ASSISTANT</span>

</div>

<div class="bot-msg">
আসসালামু আলাইকুম ! আমি BaBy ❤️<br>
আমি আপনার সাথে কথা বলতে প্রস্তুত 😘
</div>

</div>

<div class="input-area">

<input type="text" id="msg" placeholder="Aa">

<button onclick="sendMessage()">➤</button>

</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("msg");

const message = input.value;

if(message.trim() === "") return;

const chatBox = document.getElementById("chatBox");

chatBox.innerHTML += `
<div class="user-msg">${message}</div>
`;

input.value = "";

chatBox.scrollTop = chatBox.scrollHeight;

const response = await fetch('/api/chat', {

method:'POST',

headers:{
'Content-Type':'application/json'
},

body: JSON.stringify({
message
})

});

const data = await response.json();

setTimeout(()=>{

chatBox.innerHTML += `
<div class="bot-msg">${data.reply}</div>
`;

chatBox.scrollTop = chatBox.scrollHeight;

},800);

}

</script>

</body>
</html>
